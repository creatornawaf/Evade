<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Survival Starter</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="menu">
    <div class="panel">
      <h1>3D Survival Starter</h1>
      <p>Frontend for GitHub Pages + external multiplayer server.</p>

      <label>
        Name
        <input id="nameInput" maxlength="16" value="Player" />
      </label>

      <label>
        Server URL
        <input id="serverInput" value="https://YOUR-RENDER-URL.onrender.com" />
      </label>

      <button id="playBtn">Play</button>
      <p class="small">After joining, click inside the game to lock the mouse.</p>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="topLeft">
      <div>Health: <span id="healthText">100</span></div>
      <div>Stamina: <span id="staminaText">100</span></div>
      <div>Status: <span id="statusText">Alive</span></div>
      <div>Players: <span id="playersText">0</span></div>
    </div>

    <div id="crosshair">+</div>

    <div id="bottomCenter">
      <div class="barWrap">
        <div class="barLabel">Health</div>
        <div class="bar">
          <div id="healthBar" class="fill health"></div>
        </div>
      </div>

      <div class="barWrap">
        <div class="barLabel">Stamina</div>
        <div class="bar">
          <div id="staminaBar" class="fill stamina"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="overlayMessage" class="hidden"></div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
