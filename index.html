<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Survival Chase</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="menu">
    <div class="panel">
      <h1>Survival Chase</h1>
      <p>3D multiplayer chase game starter</p>

      <label>
        Name
        <input id="nameInput" maxlength="16" value="Player" />
      </label>

      <label>
        Server URL
        <input id="serverInput" value="https://YOUR-RENDER-URL.onrender.com" />
      </label>

      <button id="playBtn">Play</button>
      <p class="small">
        Desktop: click game to lock mouse. Mobile: use joystick + look area.
      </p>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="topLeft">
      <div>Health: <span id="healthText">100</span></div>
      <div>Stamina: <span id="staminaText">100</span></div>
      <div>Status: <span id="statusText">Alive</span></div>
      <div>Players: <span id="playersText">1</span></div>
      <div>Ping: <span id="pingText">-</span></div>
    </div>

    <div id="crosshair">+</div>

    <div id="bottomCenter">
      <div class="barWrap">
        <div class="barLabel">Health</div>
        <div class="bar">
          <div id="healthBar" class="fill health"></div>
        </div>
      </div>

      <div class="barWrap">
        <div class="barLabel">Stamina</div>
        <div class="bar">
          <div id="staminaBar" class="fill stamina"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="overlayMessage" class="hidden"></div>

  <!-- mobile -->
  <div id="mobileUI" class="hidden">
    <div id="movePad" class="touchPad left">
      <div id="moveStick" class="stick"></div>
    </div>

    <div id="lookArea" class="touchLook"></div>

    <button id="jumpBtn" class="mobileBtn jumpBtn">JUMP</button>
    <button id="sprintBtn" class="mobileBtn sprintBtn">SPRINT</button>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
